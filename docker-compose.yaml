services:
  postgres:
    image: postgres:15
    container_name: mindora_postgres
    restart: always
    ports:
      - "127.0.0.1:5100:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local Qdrant container removed — your .env already points QDRANT_HOST at
  # a Qdrant Cloud instance, so the backend talks to that directly instead.
  # If you ever move to a self-hosted Qdrant, re-add a service here and set
  # QDRANT_HOST=qdrant in the backend environment below.

  # vllm:
  #   image: vllm/vllm-openai:latest
  #   container_name: mindora_vllm
  #   ports:
  #     - "8001:8000" # vLLM on port 8001, backend stays on 8000
  #   environment:
  #     - CUDA_VISIBLE_DEVICES=0
  #   command:
  #     [
  #       "--model",
  #       "meta-llama/Meta-Llama-3-8B-Instruct",
  #       "--host",
  #       "0.0.0.0",
  #       "--port",
  #       "8000",
  #     ]
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   restart: unless-stopped
  # Note: This service requires NVIDIA GPU. If GPU is not available,
  # comment out this service or the backend will fall back to other LLM providers.

  backend:
    build: ./backend
    container_name: mindora_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      # Qdrant Cloud host/port/API key, LLM provider keys, CORS_ORIGINS, etc.
      # all come from here untouched — only Postgres is overridden below to
      # point at the local container instead of localhost.
      - .env
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MINDORA_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

# NOTE: the test-frontend service was removed — your frontend is deployed on
# Render, this compose file only runs the backend + Postgres. Qdrant is
# hosted on Qdrant Cloud per your .env, so there's no local vector DB
# container to manage.

volumes:
  postgres_data:
